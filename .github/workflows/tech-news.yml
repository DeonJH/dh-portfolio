name: Update Weekly Tech News

on:
  schedule:
    - cron: '0 15 * * 5'  # Every Friday at 3pm UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-digest.js

      - name: Commit if changed
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet public/tech-news.json; then
            echo "No changes to tech-news.json"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git add public/tech-news.json
            git commit -m 'chore: update weekly tech news'
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml
          echo "Deploy workflow triggered."

      - name: Write job summary
        if: success()
        run: |
          echo "## Weekly Tech News Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Digest generated from TechCrunch, OpenAI, ML Mastery, and StackOverflow RSS feeds." >> $GITHUB_STEP_SUMMARY
          echo "**Run time:** $(date -u '+%A, %B %-d %Y at %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
